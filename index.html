<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

    <!-- Open Graph for Instagram -->

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Cairo', sans-serif;
            background: #fff5f7;
            color: #3b1e2e;
            overflow-x: hidden;
            overflow-y: scroll;
            scroll-behavior: smooth;
            text-transform: uppercase;
        }

        /* ===== LOADING ===== */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff5f7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1.5s ease, visibility 1.5s ease;
        }
        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .loader-spinner {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid rgba(255, 182, 193, 0.3);
            border-top: 4px solid #ff69b4;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.2);
        }
        .loader-text {
            margin-top: 25px;
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 4px;
            color: #ff69b4;
            text-transform: uppercase;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
        @keyframes pulse {
            0% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.4;
            }
        }

        /* ===== 3D CANVAS ===== */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== CONTENT ===== */
        .content {
            position: relative;
            z-index: 1;
            pointer-events: none;
        }

        /* ===== LUCKY CLICKS COUNTER ===== */
        #wishes-counter {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 182, 193, 0.5);
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            color: #3b1e2e;
            pointer-events: none;
            box-shadow: 0 8px 30px rgba(255, 105, 180, 0.15);
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
        }
        #wishes-counter span {
            color: #ff1493;
            font-size: 18px;
            margin-right: 4px;
        }
        #wish-count {
            color: #ff1493;
            font-size: 22px;
            font-weight: 700;
            min-width: 30px;
            text-align: center;
        }

        /* ===== 3D MOTIVATIONAL MESSAGE OVERLAY ===== */
        #message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            pointer-events: none;
        }
        #message-overlay.active {
            display: flex;
            pointer-events: auto;
        }
        #message-overlay .msg-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 10, 15, 0.3);
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        #message-overlay .msg-box {
            position: relative;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            padding: 40px 50px;
            max-width: 90%;
            box-shadow: 0 30px 100px rgba(255, 20, 147, 0.4), 0 0 80px rgba(255, 105, 180, 0.3);
            text-align: center;
            transform-style: preserve-3d;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.2s ease;
            text-transform: uppercase;
        }
        #message-overlay .msg-box:hover {
            transform: scale(1.02) rotateY(2deg) rotateX(2deg);
        }
        #message-overlay .msg-text {
            font-family: 'Poppins', 'Cairo', sans-serif;
            font-size: clamp(1.8rem, 6vw, 4.2rem);
            font-weight: 900;
            line-height: 1.3;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 20, 147, 0.8), 0 0 60px rgba(255, 20, 147, 0.5), 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .msg-sub {
            margin-top: 15px;
            font-size: 1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* ===== SECTIONS ===== */
        .section {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
            text-align: center;
            pointer-events: none;
        }

        .section-inner {
            max-width: 1000px;
            width: 100%;
            padding: 20px;
            pointer-events: auto;
        }

        /* ===== SECTION 1: HERO ===== */
        #section-1 .hero-title {
            font-size: clamp(1.8rem, 7vw, 3.8rem);
            font-weight: 700;
            line-height: 1.3;
            color: #3b1e2e;
            text-shadow: 0 4px 30px rgba(255, 105, 180, 0.15);
            min-height: 1.4em;
            text-transform: uppercase;
        }
        #section-1 .hero-title .highlight {
            background: linear-gradient(135deg, #ff1493, #ff69b4, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
        }
        #typewriter-cursor {
            display: inline-block;
            width: 3px;
            height: 1em;
            background: #ff69b4;
            margin-left: 5px;
            vertical-align: text-bottom;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* ===== SECTION 2: GALLERY ===== */
        #section-2 .gallery-header {
            font-size: 1.6rem;
            font-weight: 400;
            color: #3b1e2e;
            margin-bottom: 30px;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            text-transform: uppercase;
        }
        #section-2 .gallery-header.visible {
            opacity: 1;
            transform: translateY(0);
        }
        #section-2 .gallery-header strong {
            color: #ff1493;
            font-weight: 700;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 10px;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.9s ease, transform 0.9s ease;
        }
        .gallery-grid.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .gallery-item {
            background: white;
            border-radius: 20px;
            padding: 8px 8px 16px 8px;
            box-shadow: 0 10px 35px rgba(255, 105, 180, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 182, 193, 0.25);
            cursor: pointer;
        }
        .gallery-item:hover {
            transform: scale(1.04) rotate(-1deg);
            box-shadow: 0 20px 50px rgba(255, 105, 180, 0.25);
        }
        .gallery-item img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 14px;
            display: block;
            background: #ffe4e9;
            pointer-events: none;
        }

        /* ===== LIGHTBOX ===== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 10, 15, 0.85);
            backdrop-filter: blur(8px);
            z-index: 9998;
            justify-content: center;
            align-items: center;
            padding: 30px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .lightbox.active {
            display: flex;
            opacity: 1;
        }
        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            object-fit: contain;
            background: white;
            padding: 4px;
        }
        .lightbox.active .lightbox-content {
            transform: scale(1);
        }
        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 3rem;
            font-weight: 300;
            color: white;
            cursor: pointer;
            transition: transform 0.3s ease, color 0.3s ease;
            z-index: 9999;
            background: none;
            border: none;
            line-height: 1;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
        }
        .lightbox-close:hover {
            transform: rotate(90deg);
            color: #ff69b4;
        }

        /* ===== SECTION 3: FINAL ===== */
        #section-3 .final-text {
            font-size: clamp(1.4rem, 4.5vw, 2.8rem);
            font-weight: 700;
            line-height: 1.4;
            color: #3b1e2e;
            text-shadow: 0 4px 40px rgba(255, 105, 180, 0.15);
            background: linear-gradient(145deg, #3b1e2e 0%, #ff1493 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: scale(0.95);
            transition: all 1s ease;
            text-transform: uppercase;
        }
        #section-3 .final-text.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* ===== SCROLL INDICATOR ===== */
        .scroll-down {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 105, 180, 0.4);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: floatDown 2s ease-in-out infinite;
            transition: opacity 0.6s ease;
            pointer-events: auto;
        }
        .scroll-down.hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }
        @keyframes floatDown {
            0% {
                transform: translateX(-50%) translateY(0);
                opacity: 0.4;
            }
            50% {
                transform: translateX(-50%) translateY(10px);
                opacity: 1;
            }
            100% {
                transform: translateX(-50%) translateY(0);
                opacity: 0.4;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            #wishes-counter {
                font-size: 12px;
                padding: 6px 14px;
                top: 15px;
                right: 15px;
            }
            #wishes-counter span {
                font-size: 16px;
            }
            #wish-count {
                font-size: 18px;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 14px;
            }
            #section-2 .gallery-header {
                font-size: 1.2rem;
            }
            .lightbox-close {
                top: 20px;
                right: 25px;
                font-size: 2.5rem;
            }
            #message-overlay .msg-box {
                padding: 30px 25px;
                border-radius: 40px;
            }
        }
        @media (max-width: 480px) {
            .section {
                padding: 20px 12px;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 10px;
            }
            .gallery-item {
                padding: 5px 5px 12px 5px;
            }
            .lightbox-content {
                max-width: 95%;
                max-height: 85%;
            }
            #message-overlay .msg-box {
                padding: 20px 18px;
                border-radius: 30px;
            }
        }
    </style>
</head>

    <!-- ===== THREE.JS IMPORT MAP ===== -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

    <!-- ===== MAIN SCRIPT ===== -->
    <script type="module">
        // ============================================================
        // 1. IMPORTS
        // ============================================================
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import gsap from 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm';
        import { ScrollTrigger } from 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/ScrollTrigger.js';

        gsap.registerPlugin(ScrollTrigger);

        // ============================================================
        // 2. SCENE, CAMERA, RENDERER
        // ============================================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfff5f7);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1, 6);
        camera.lookAt(0, 0.4, 0);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: false,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // ============================================================
        // 3. BLOOM
        // ============================================================
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.7,
            0.4,
            0.1
        );
        composer.addPass(bloomPass);

        // ============================================================
        // 4. LIGHTS
        // ============================================================
        const ambientLight = new THREE.AmbientLight(0xffe4e9, 0.8);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffb6c1, 1.8);
        mainLight.position.set(2, 5, 5);
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.6);
        fillLight.position.set(-3, 1, -2);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xff69b4, 1.2);
        rimLight.position.set(0, -2, 4);
        scene.add(rimLight);

        const glowLight = new THREE.PointLight(0xff69b4, 1.2, 10);
        glowLight.position.set(0, 0.5, 1);
        scene.add(glowLight);

        // ============================================================
        // 5. 3D SUSHI
        // ============================================================

        // --- Stars ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1800;
        const starPos = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i += 3) {
            const r = 12 + Math.random() * 30;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            starPos[i] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i + 1] = r * Math.sin(phi) * Math.sin(theta);
            starPos[i + 2] = r * Math.cos(phi);
            const col = new THREE.Color().setHSL(0.93, 0.4, 0.8 + Math.random() * 0.2);
            starColors[i] = col.r;
            starColors[i + 1] = col.g;
            starColors[i + 2] = col.b;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

        const starMat = new THREE.PointsMaterial({
            size: 0.15,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            vertexColors: true
        });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // --- Sushi Group ---
        const sushiGroup = new THREE.Group();

        function createNigiri(colorFish = 0xff8c69, offsetX = 0, offsetZ = 0) {
            const group = new THREE.Group();
            const riceGeo = new THREE.CylinderGeometry(0.45, 0.55, 0.25, 16);
            const riceMat = new THREE.MeshStandardMaterial({ color: 0xfff5e6, roughness: 0.9, metalness: 0 });
            const rice = new THREE.Mesh(riceGeo, riceMat);
            rice.position.y = 0;
            group.add(rice);

            const fishGeo = new THREE.SphereGeometry(0.48, 16, 16);
            const fishMat = new THREE.MeshStandardMaterial({ color: colorFish, roughness: 0.3, metalness: 0.1,
                emissive: colorFish, emissiveIntensity: 0.08 });
            const fish = new THREE.Mesh(fishGeo, fishMat);
            fish.scale.set(1, 0.2, 0.65);
            fish.position.y = 0.22;
            group.add(fish);

            const noriGeo = new THREE.BoxGeometry(0.03, 0.28, 0.7);
            const noriMat = new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.9 });
            const nori = new THREE.Mesh(noriGeo, noriMat);
            nori.position.set(0.5, 0.1, 0);
            group.add(nori);
            const nori2 = nori.clone();
            nori2.position.set(-0.5, 0.1, 0);
            group.add(nori2);

            group.position.set(offsetX, 0.2, offsetZ);
            return group;
        }

        function createMaki(offsetX = 0, offsetZ = 0) {
            const group = new THREE.Group();
            const riceGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.3, 12);
            const riceMat = new THREE.MeshStandardMaterial({ color: 0xfff5e6, roughness: 0.8 });
            const rice = new THREE.Mesh(riceGeo, riceMat);
            rice.rotation.x = Math.PI / 2;
            rice.position.y = 0;
            group.add(rice);

            const noriGeo = new THREE.CylinderGeometry(0.27, 0.27, 0.32, 12);
            const noriMat = new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.9, transparent: true,
                opacity: 0.6 });
            const nori = new THREE.Mesh(noriGeo, noriMat);
            nori.rotation.x = Math.PI / 2;
            nori.position.y = 0;
            group.add(nori);

            const fillColors = [0xff6347, 0x32cd32, 0xffa500];
            for (let i = 0; i < 3; i++) {
                const fGeo = new THREE.SphereGeometry(0.06, 6, 6);
                const fMat = new THREE.MeshStandardMaterial({ color: fillColors[i % fillColors.length], roughness: 0.5 });
                const f = new THREE.Mesh(fGeo, fMat);
                const angle = (i / 3) * Math.PI * 2;
                f.position.set(Math.cos(angle) * 0.12, 0, Math.sin(angle) * 0.12);
                group.add(f);
            }
            group.position.set(offsetX, 0.15, offsetZ);
            group.rotation.y = Math.random() * Math.PI;
            return group;
        }

        const nigiriMain = createNigiri(0xff8c69, 0, 0);
        sushiGroup.add(nigiriMain);
        const nigiriSide1 = createNigiri(0xff4d4d, 0.9, 0.6);
        nigiriSide1.scale.set(0.8, 0.8, 0.8);
        sushiGroup.add(nigiriSide1);
        const nigiriSide2 = createNigiri(0xffb347, -0.9, -0.6);
        nigiriSide2.scale.set(0.8, 0.8, 0.8);
        sushiGroup.add(nigiriSide2);
        const maki1 = createMaki(1.1, -0.5);
        maki1.scale.set(0.9, 0.9, 0.9);
        sushiGroup.add(maki1);
        const maki2 = createMaki(-1.1, 0.5);
        maki2.scale.set(0.9, 0.9, 0.9);
        sushiGroup.add(maki2);

        const stickMat = new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.7 });
        for (let i = -1; i <= 1; i += 2) {
            const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.03, 0.8, 6), stickMat);
            stick.position.set(i * 0.15, 0.6, 1.2);
            stick.rotation.x = 0.2;
            stick.rotation.z = i * 0.1;
            sushiGroup.add(stick);
        }
        sushiGroup.position.y = 0.0;
        scene.add(sushiGroup);

        // --- Hearts ---
        const hearts = [];

        function createHeart3D() {
            const shape = new THREE.Shape();
            shape.moveTo(0, 0);
            shape.bezierCurveTo(0, -0.3, -0.6, -0.5, -0.9, 0);
            shape.bezierCurveTo(-1.2, 0.5, -0.6, 0.9, 0, 1.6);
            shape.bezierCurveTo(0.6, 0.9, 1.2, 0.5, 0.9, 0);
            shape.bezierCurveTo(0.6, -0.5, 0, -0.3, 0, 0);
            const extrudeSettings = { steps: 1, depth: 0.15, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.05,
                bevelSegments: 3 };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const hue = 0.93 + Math.random() * 0.05;
            const color = new THREE.Color().setHSL(hue, 0.9, 0.65);
            const material = new THREE.MeshStandardMaterial({ color, metalness: 0.1, roughness: 0.2, emissive: color,
                emissiveIntensity: 0.15 });
            const heart = new THREE.Mesh(geometry, material);
            heart.scale.set(0.2, 0.2, 0.2);
            return heart;
        }

        const heartCount = 12;
        for (let i = 0; i < heartCount; i++) {
            const heart = createHeart3D();
            const angle = (i / heartCount) * Math.PI * 2;
            const radius = 2.0 + Math.random() * 0.5;
            heart.userData = { angle, radius, speed: 0.25 + Math.random() * 0.2, offsetY: (Math.random() - 0.5) * 1.6,
                phase: Math.random() * Math.PI * 2 };
            heart.position.set(Math.cos(angle) * radius, 0.4 + Math.sin(angle * 2) * 0.3, Math.sin(angle) * radius);
            heart.lookAt(0, 0.4, 0);
            scene.add(heart);
            hearts.push(heart);
        }

        // --- Halo Particles ---
        const haloParticlesGeo = new THREE.BufferGeometry();
        const haloCount = 700;
        const haloPositions = new Float32Array(haloCount * 3);
        const haloColors = new Float32Array(haloCount * 3);
        const haloSpeeds = new Float32Array(haloCount);
        const haloPhases = new Float32Array(haloCount);
        for (let i = 0; i < haloCount; i++) {
            const radius = 2.2 + Math.random() * 1.8;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            haloPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            haloPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta) + 0.4;
            haloPositions[i * 3 + 2] = radius * Math.cos(phi);
            const col = new THREE.Color().setHSL(0.93, 0.5, 0.85 + Math.random() * 0.15);
            haloColors[i * 3] = col.r;
            haloColors[i * 3 + 1] = col.g;
            haloColors[i * 3 + 2] = col.b;
            haloSpeeds[i] = 0.15 + Math.random() * 0.25;
            haloPhases[i] = Math.random() * Math.PI * 2;
        }
        haloParticlesGeo.setAttribute('position', new THREE.BufferAttribute(haloPositions, 3));
        haloParticlesGeo.setAttribute('color', new THREE.BufferAttribute(haloColors, 3));

        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 64, 64);
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = '#ff69b4';
        ctx.beginPath();
        ctx.arc(32, 32, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff69b4';
        ctx.font = 'bold 18px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('♥', 32, 34);
        const particleTexture = new THREE.CanvasTexture(canvas);

        const haloMat = new THREE.PointsMaterial({
            size: 0.2,
            map: particleTexture,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            vertexColors: true,
            opacity: 0.7
        });
        const haloPoints = new THREE.Points(haloParticlesGeo, haloMat);
        scene.add(haloPoints);

        const haloPosAttr = haloParticlesGeo.attributes.position;
        const initialHaloPos = new Float32Array(haloPosAttr.array);

        // ============================================================
        // 6. MOUSE PARALLAX
        // ============================================================
        const mouse = { x: 0, y: 0 };
        const target = { x: 0, y: 0 };

        document.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
        }, { passive: true });

        // ============================================================
        // 7. CLICK -> CONFETTI + LUCKY COUNT + MOTIVATIONAL MESSAGES
        // ============================================================
        let wishCount = 0;
        const wishCounterEl = document.getElementById('wish-count');
        const messageOverlay = document.getElementById('message-overlay');
        const msgText = document.getElementById('msg-text');
        const msgBox = document.getElementById('msg-box');

        // ============================================================
        // UPDATED MOTIVATIONAL MESSAGES - MORE POSITIVE & SUPPORTIVE
        // ============================================================
        const motivationalMessages = [
            "YOU FEELING PRESSURE? YOU'LL MAKE IT LITTLE ANGEL",
            "YOUR MAN GOT YOUR BACK ALWAYS",
            "I WISH YOU BEST OF LUCK, YOU'RE GAINING MORE LUCK",
            "YOU ARE NOT ALONE, I'M ALWAYS WITH YOU",
            "KEEP SHINING, QUEEN, NOTHING CAN STOP YOU",
            "BELIEVE IN YOURSELF, YOU ARE CAPABLE OF ANYTHING",
            "DON'T WORRY, YOU GOT THIS!",
            "EVERYTHING WILL BE OK, U A DIVA, KEEP GOING",
            "I BELIEVE IN U ❤️",
            "YOU'RE GONNA ACE THESE EXAMS!",
            "SENDING YOU PAWSITIVE ENERGY!",
            "YOU ARE STRONGER THAN YOU THINK",
            "YOUR FUTURE IS BRIGHT, GO GET IT",
            "I'M SO PROUD OF YOU, KEEP PUSHING"
        ];

        let isMessageShowing = false;
        let messageTimeout = null;

        function showMotivationalMessage() {
            if (isMessageShowing) return;
            isMessageShowing = true;

            const index = (Math.floor(wishCount / 25) - 1) % motivationalMessages.length;
            const text = motivationalMessages[index];

            msgText.textContent = text;

            gsap.set(msgBox, {
                scale: 0.2,
                rotationY: -90,
                rotationX: 20,
                opacity: 0,
                transformPerspective: 800
            });

            messageOverlay.classList.add('active');

            const tl = gsap.timeline({
                defaults: { duration: 0.8, ease: "back.out(2)" }
            });

            tl.to(msgBox, {
                scale: 1.1,
                rotationY: 0,
                rotationX: 0,
                opacity: 1,
                duration: 0.9,
                ease: "back.out(2.5)"
            })
            .to(msgBox, {
                scale: 1,
                duration: 0.3,
                ease: "power2.out"
            });

            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    spawnConfetti(window.innerWidth / 2 + (Math.random() - 0.5) * 300, window.innerHeight / 2 + (Math
                    .random() - 0.5) * 200);
                }, i * 200);
            }

            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                hideMessage();
            }, 4500);
        }

        function hideMessage() {
            if (!isMessageShowing) return;
            isMessageShowing = false;
            clearTimeout(messageTimeout);

            gsap.to(msgBox, {
                scale: 0.5,
                rotationY: 60,
                rotationX: -15,
                opacity: 0,
                duration: 0.5,
                ease: "power3.in",
                onComplete: () => {
                    messageOverlay.classList.remove('active');
                }
            });
        }

        msgBox.addEventListener('click', (e) => {
            e.stopPropagation();
            hideMessage();
        });

        messageOverlay.addEventListener('click', (e) => {
            if (e.target === messageOverlay || e.target === document.querySelector('.msg-backdrop')) {
                hideMessage();
            }
        });

        function spawnConfetti(clientX, clientY) {
            wishCount++;
            wishCounterEl.textContent = wishCount;
            gsap.fromTo(wishCounterEl, { scale: 1.5, color: '#ff1493' }, { scale: 1, color: '#ff1493', duration: 0.4,
                ease: 'back.out(2)' });

            if (wishCount % 25 === 0 && wishCount > 0) {
                showMotivationalMessage();
            }

            const count = 60;
            const colors = [0xffb6c1, 0xff69b4, 0xff1493, 0xffd700, 0xffffff];
            const confettiGroup = new THREE.Group();

            for (let i = 0; i < count; i++) {
                const size = 0.04 + Math.random() * 0.08;
                const geo = Math.random() > 0.5 ? new THREE.BoxGeometry(size, size * 2, size) : new THREE.CircleGeometry(
                    size, 3);
                const mat = new THREE.MeshStandardMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)],
                    emissive: 0x555555,
                    emissiveIntensity: 0.3,
                    metalness: 0.2,
                    roughness: 0.5
                });
                const mesh = new THREE.Mesh(geo, mat);
                const vec = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
                mesh.position.copy(vec).add(camera.position).add(new THREE.Vector3(0, -0.5, -2));
                mesh.userData.vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    Math.random() * 0.2 + 0.05,
                    (Math.random() - 0.5) * 0.2
                );
                mesh.userData.life = 1.0;
                mesh.userData.rotSpeed = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.2,
                    (Math.random() - 0.5) * 0.2,
                    (Math.random() - 0.5) * 0.2
                );
                confettiGroup.add(mesh);
            }
            scene.add(confettiGroup);

            const duration = 1.8;
            const startTime = performance.now();

            function animateConfetti(time) {
                const delta = (time - startTime) / 1000;
                if (delta > duration) {
                    scene.remove(confettiGroup);
                    confettiGroup.children.forEach(child => {
                        child.geometry.dispose();
                        child.material.dispose();
                    });
                    return;
                }
                const progress = delta / duration;
                confettiGroup.children.forEach(mesh => {
                    mesh.position.add(mesh.userData.vel);
                    mesh.userData.vel.y -= 0.008;
                    mesh.rotation.x += mesh.userData.rotSpeed.x;
                    mesh.rotation.y += mesh.userData.rotSpeed.y;
                    const scale = 1 - progress * 0.8;
                    mesh.scale.set(scale, scale, scale);
                    mesh.material.opacity = 1 - progress;
                    mesh.material.transparent = true;
                });
                requestAnimationFrame(animateConfetti);
            }
            requestAnimationFrame(animateConfetti);
        }

        window.addEventListener('click', (e) => {
            if (lightbox.classList.contains('active')) return;
            if (messageOverlay.classList.contains('active')) return;
            spawnConfetti(e.clientX, e.clientY);
        });
        window.addEventListener('touchstart', (e) => {
            if (lightbox.classList.contains('active')) return;
            if (messageOverlay.classList.contains('active')) return;
            if (e.touches.length > 0) {
                spawnConfetti(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        // ============================================================
        // 8. SCROLL TRIGGER
        // ============================================================
        ScrollTrigger.refresh();

        // --- Hide Scroll Down when leaving section 1 ---
        const scrollDown = document.getElementById('scroll-down');
        ScrollTrigger.create({
            trigger: '#section-1',
            start: 'bottom center',
            onEnter: () => {
                scrollDown.classList.add('hidden');
            },
            onEnterBack: () => {
                scrollDown.classList.remove('hidden');
            }
        });

        // --- Typewriter (UPPERCASE) ---
        const typewriterText = document.getElementById('typewriter-text');
        const phrases = [
            "you got this baby girl",
            "you’re the smartest girl I’ve knows",
            "you’ll make it genius"
        ];
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function typeWriter() {
            const currentPhrase = phrases[phraseIndex];
            if (isDeleting) {
                typewriterText.textContent = currentPhrase.substring(0, charIndex - 1).toUpperCase();
                charIndex--;
                if (charIndex === 0) {
                    isDeleting = false;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                    if (phraseIndex !== 0) {
                        typewriterText.innerHTML += '<br />';
                    }
                    setTimeout(typeWriter, 400);
                    return;
                }
                setTimeout(typeWriter, 40);
            } else {
                typewriterText.textContent = currentPhrase.substring(0, charIndex + 1).toUpperCase();
                charIndex++;
                if (charIndex === currentPhrase.length) {
                    isDeleting = true;
                    setTimeout(typeWriter, 2500);
                    return;
                }
                setTimeout(typeWriter, 70);
            }
        }
        setTimeout(typeWriter, 800);

        // --- Gallery ---
        const galleryHeader = document.getElementById('gallery-header');
        const galleryGrid = document.getElementById('gallery-grid');

        ScrollTrigger.create({
            trigger: '#section-2',
            start: 'top center',
            onEnter: () => {
                galleryHeader.classList.add('visible');
                galleryGrid.classList.add('visible');
            },
            onEnterBack: () => {
                galleryHeader.classList.add('visible');
                galleryGrid.classList.add('visible');
            }
        });

        // --- Final text ---
        const finalText = document.getElementById('final-text');
        ScrollTrigger.create({
            trigger: '#section-3',
            start: 'top center',
            onEnter: () => {
                finalText.classList.add('visible');
            },
            onEnterBack: () => {
                finalText.classList.add('visible');
            }
        });

        // ============================================================
        // 9. LIGHTBOX
        // ============================================================
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxClose = document.getElementById('lightbox-close');

        galleryGrid.addEventListener('click', (e) => {
            const item = e.target.closest('.gallery-item');
            if (!item) return;
            const img = item.querySelector('img');
            if (!img) return;
            lightboxImg.src = img.src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        });

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
            setTimeout(() => {
                if (!lightbox.classList.contains('active')) {
                    lightboxImg.src = '';
                }
            }, 400);
        }

        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
                hideMessage();
            }
        });

        // ============================================================
        // 10. RESIZE
        // ============================================================
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
        });

        // ============================================================
        // 11. ANIMATION LOOP
        // ============================================================
        let clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            target.x += (mouse.x - target.x) * 0.05;
            target.y += (mouse.y - target.y) * 0.05;
            camera.position.x += (target.x * 0.8 - camera.position.x) * 0.02;
            camera.position.y += (target.y * 0.5 + 1 - camera.position.y) * 0.02;
            camera.lookAt(0, 0.4, 0);

            sushiGroup.rotation.y += 0.003;
            sushiGroup.position.y = Math.sin(elapsed * 0.3) * 0.05;
            const pulse = Math.sin(elapsed * 1.5) * 0.3 + 0.7;
            glowLight.intensity = 0.8 + pulse * 0.8;

            hearts.forEach((heart, i) => {
                const data = heart.userData;
                const angle = data.angle + elapsed * data.speed * 0.4;
                const radius = data.radius + Math.sin(elapsed * 0.5 + data.phase) * 0.2;
                heart.position.x = Math.cos(angle) * radius;
                heart.position.z = Math.sin(angle) * radius;
                heart.position.y = 0.4 + Math.sin(elapsed * 0.8 + data.phase) * 0.6 + data.offsetY * 0.3;
                heart.lookAt(0, 0.4, 0);
                heart.rotation.z = Math.sin(elapsed * 0.5 + i) * 0.1;
                const s = 0.2 + Math.sin(elapsed * 1.2 + i) * 0.03;
                heart.scale.set(s, s, s);
            });

            const positions = haloParticlesGeo.attributes.position.array;
            for (let i = 0; i < haloCount; i++) {
                const i3 = i * 3;
                const origX = initialHaloPos[i3];
                const origY = initialHaloPos[i3 + 1];
                const origZ = initialHaloPos[i3 + 2];
                const phase = haloPhases[i];
                const speed = haloSpeeds[i];
                const wave = Math.sin(elapsed * speed + phase) * 0.1;
                const dir = new THREE.Vector3(origX, origY - 0.4, origZ).normalize();
                positions[i3] = origX + dir.x * wave;
                positions[i3 + 1] = origY + dir.y * wave;
                positions[i3 + 2] = origZ + dir.z * wave;
            }
            haloParticlesGeo.attributes.position.needsUpdate = true;

            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;

            composer.render();
            requestAnimationFrame(animate);
        }

        animate();

        // ============================================================
        // 12. HIDE LOADER
        // ============================================================
        setTimeout(() => {
            document.getElementById('loader').classList.add('hidden');
        }, 1500);

        console.log('SUSHI MAGIC LOADED! GOOD LUCK TO AURORA!');
    </script>
</body>
</html>
